<div class="page-section">
  <div class="container">
    <h2 class="section-title">Get in touch</h2>
    <div class="contact-wrapper">
      <div class="contact-info">
        <p><i class="fas fa-envelope"></i> limdongx@gmail.com</p>
        <p><i class="fab fa-github"></i> github.com/limdx006</p>
        <p><i class="fab fa-linkedin"></i> linkedin.com/in/dongxian-lim</p>
      </div>
      <form id="contact-form" class="contact-form" data-endpoint="" method="post">
